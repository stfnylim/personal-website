name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # deploy on every push to main
  workflow_dispatch:  # allow manual trigger from the Actions tab

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        # If deploying without a custom domain to username.github.io/repo-name,
        # set VITE_BASE_URL and update vite.config.js to use process.env.VITE_BASE_URL.
        # env:
        #   VITE_BASE_URL: /your-repo-name/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
