<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Your Name — Pipeline TD</title>
    <!--
      Single-page app redirect for GitHub Pages.
      When GitHub serves this 404.html for any unknown path, we encode the
      original path into a query string and redirect to index.html.
      The script in index.html then restores the path before React Router boots.
      Based on: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1; // 1 = keep /personal-website/ prefix in the redirect
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
